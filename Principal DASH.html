<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter', sans-serif;
background:#f4f8fc;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.logo{
font-family:'Poppins', sans-serif;
font-size:20px;
color:#1E88E5;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#333;
font-weight:500;
}

.section{
padding:40px 8%;
}

.section h2{
font-family:'Poppins', sans-serif;
color:#1E88E5;
margin-bottom:20px;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.card{
flex:1;
min-width:200px;
padding:25px;
border-radius:12px;
color:white;
font-weight:600;
}

.total{background:#1E88E5;}
.escalated{background:#e53935;}
.resolved{background:#43a047;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

th, td{
padding:15px;
text-align:center;
}

th{
background:#1E88E5;
color:white;
}

tr:nth-child(even){
background:#f2f6fc;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#1E88E5;
color:white;
cursor:pointer;
}

button:hover{
background:#1565C0;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">Fr.Conceicao Rodrigues College of Engineering - Principal Panel</div>
<nav>
<a href="student.html">Home</a>
<a href="Principal.html" onclick="logout(); return false;">Logout</a>
</nav>
</header>

<section class="section">
<h2>Welcome, Principal 👋</h2>

<div class="cards">
<div class="card total">Total Complaints: 0</div>
<div class="card escalated">In Progress: 0</div>
<div class="card resolved">Resolved: 0</div>
</div>

<h3>Department Wise Overview</h3>

<table>
<thead>
<tr>
<th>Department</th>
<th>Total</th>
<th>Pending</th>
<th>Resolved</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr>
<td colspan="5" style="text-align:center; padding:20px;">Loading department data...</td>
</tr>
</tbody>
</table>

</section>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentUser = getCurrentUser();
    if (!currentUser || currentUser.role !== 'principal') {
        alert('Please login as Principal');
        window.location.href = 'Principal.html';
        return;
    }
    
    displayPrincipalStats();
    displayDepartmentStats();
});
</script>

</body>
