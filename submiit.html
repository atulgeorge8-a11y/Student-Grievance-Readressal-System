<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Grievance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter', sans-serif;
    background:#f4f8fc;
}

/* Navbar */
header{
    padding:20px 8%;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Poppins', sans-serif;
    font-size:20px;
    color:#1E88E5;
}

header a{
    text-decoration:none;
    color:#333;
    margin-left:20px;
    font-weight:500;
}

header a:hover{
    color:#1E88E5;
}

/* Form Section */
.section{
    padding:60px 8%;
}

.section h2{
    text-align:center;
    font-family:'Poppins', sans-serif;
    margin-bottom:30px;
    color:#1E88E5;
}

.form-box{
    max-width:600px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

label{
    font-weight:500;
}

input, select, textarea{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-family:'Inter', sans-serif;
}

textarea{
    resize:none;
    height:110px;
}

.submit-btn{
    margin-top:10px;
    padding:12px;
    background:#1E88E5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.submit-btn:hover{
    background:#1565C0;
}

.note{
    margin-top:15px;
    font-size:14px;
    color:#666;
    text-align:center;
}

.anonymous-option{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

/* Responsive */
@media(max-width:768px){
    .form-box{
        padding:25px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">Fr. Conceicao Rodrigues College of Engineering</div>
    <nav>
        <a href="student.html">Home</a>
        <a href="Spage.html">Dashboard</a>
        <a href="track.html">Track Grievance</a>
        <a href="login.html">Faculty Login</a>
        <a href="HOD.html">HOD Login</a>
        <a href="Principal.html">Principal Login</a>
    </nav>
</header>

<section class="section">
    <h2>Submit a Grievance</h2>

    <div class="form-box">
        <form id="grievanceForm">

            <!-- Anonymous Option -->
            <div class="anonymous-option">
                <input type="checkbox" id="anonymousCheck">
                <label for="anonymousCheck">Submit as Anonymous</label>
            </div>

            <!-- Student Details -->
            <div id="studentDetails">

                <div>
                    <label>Student Name</label>
                    <input type="text" id="studentName" placeholder="Enter your full name">
                </div>

                <div>
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber" placeholder="Enter your roll number">
                </div>

            </div>

            <div>
                <label>Grievance Title</label>
                <input type="text" id="grievanceTitle" placeholder="Enter grievance title" required>
            </div>

            <div>
                <label>Category</label>
                <select id="grievanceCategory" required>
                    <option value="">Select Category</option>
                    <option>Academic</option>
                    <option>Hostel</option>
                    <option>Exam</option>
                    <option>Infrastructure</option>
                    <option>Harassment</option>
                </select>
            </div>

            <div>
                <label>Department Concerned</label>
                <select id="grievanceDepartment" required>
                    <option value="">Select Department/Branch</option>
                    <option>Computer Engineering</option>
                    <option>Information Technology</option>
                    <option>Electronics and Computer Science</option>
                    <option>Mechanical Engineering</option>
                    <option>Artificial Intelligence & Data Science</option>
                    <option>Humanities and Sciences</option>
                </select>
            </div>

            <div>
                <label>Description</label>
                <textarea id="grievanceDescription" placeholder="Describe your grievance in detail..." required></textarea>
            </div>

            <div>
                <label>Upload Supporting File (Optional)</label>
                <input type="file" id="grievanceFile">
            </div>

            <button type="submit" class="submit-btn">Submit Grievance</button>
        </form>

        <div class="note">
            Your grievance will be handled confidentially by authorized personnel only.
        </div>
    </div>
</section>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const grievanceForm = document.getElementById('grievanceForm');
    if (grievanceForm) {
        grievanceForm.addEventListener('submit', function(e) {
            e.preventDefault();
            submitGrievance();
        });
    }
});
</script>

</body>
</html>
