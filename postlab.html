<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Health Form</title>

<style>
    body {
        font-family: "Times New Roman", serif;
        background-color: #f5f5f5;
    }

    .container {
        width: 400px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px gray;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-size: 18px;
    }

    input, select {
        width: 100%;
        padding: 6px;
        margin-top: 5px;
        font-size: 16px;
    }

    .radio-group {
        margin-top: 8px;
    }

    .radio-group input {
        width: auto;
        margin-right: 5px;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        font-size: 16px;
        background-color: black;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: #333;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Student Health Details Form</h1>

    <!-- IMPORTANT -->
    <form name="google-sheet">

        <label>Name:</label>
        <input type="text" name="name" required>

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>

        <label>Blood Group:</label>
        <select name="blood">
            <option value="A+">A+</option>
            <option value="B+">B+</option>
            <option value="O+">O+</option>
            <option value="AB+">AB+</option>
            <option value="A-">A-</option>
            <option value="B-">B-</option>
            <option value="O-">O-</option>
            <option value="AB-">AB-</option>
        </select>

        <label>Vaccinated:</label>
        <div class="radio-group">
            <input type="radio" name="vaccinated" value="Yes" required> Yes
            <input type="radio" name="vaccinated" value="No"> No
        </div>

        <label>Reference Link:</label>
        <input type="url" name="link" placeholder="https://example.com">

        <label>Timestamp:</label>
        <input type="text" name="timestamp" id="timestamp" readonly>

        <button type="submit">Submit</button>

    </form>
</div>

<script>
    // 🔹 PUT YOUR GOOGLE SCRIPT LINK HERE
    const scriptURL ="https://script.google.com/macros/s/AKfycbxu3VFoWeBa0M_9hEQvEk11tEiyhTlsTtU1HdUhjs5-Bt-wFZ7Zve0ulZUU9dGd3Qmc/exec"

    const form = document.forms['google-sheet'];

    // Auto timestamp
    document.getElementById("timestamp").value = new Date().toLocaleString();

    form.addEventListener('submit', e => {
        e.preventDefault();

        fetch(scriptURL, {
            method: 'POST',
            body: new FormData(form)
        })
        .then(response => alert("Form submitted successfully!"))
        .catch(error => console.error('Error!', error.message));
    });
</script>

</body>
</html>
